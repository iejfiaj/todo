<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>✨ SOYEON's To-do ✨</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon-192.png" sizes="192x192" type="image/png" />
  <link rel="icon" href="icon-512.png" sizes="512x512" type="image/png" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <meta name="theme-color" content="#fcd34d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="To-do" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- 로그인 화면 -->
  <section id="login-screen" class="login-screen" hidden>
    <div class="login-card">
      <h1>✨ SOYEON's To-do ✨</h1>
      <p class="login-desc">Google 계정으로 로그인하면 모든 기기에서 데이터가 동기화됩니다.</p>
      <button type="button" id="login-btn" class="google-btn">
        <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
          <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
          <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
          <path fill="#FBBC05" d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z"/>
          <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 7.293C4.672 5.166 6.656 3.58 9 3.58z"/>
        </svg>
        <span>Google로 로그인</span>
      </button>
      <p class="login-status" id="login-status" hidden></p>
    </div>
  </section>

  <!-- 메인 앱 -->
  <main class="app" id="app-main" hidden>
    <header class="app-header">
      <div class="user-bar">
        <span id="user-badge" class="user-badge"></span>
        <button type="button" id="logout-btn" class="logout-btn">로그아웃</button>
      </div>
      <h1>✨ SOYEON's To-do ✨</h1>
      <p id="today-date" class="today-date"></p>
    </header>

    <section class="input-section">
      <input
        type="text"
        id="task-input"
        placeholder="할 일을 입력하세요..."
        autocomplete="off"
      />
      <select id="category-select">
        <option value="학교 공부">학교 공부</option>
        <option value="개인 공부">개인 공부</option>
        <option value="업무">업무</option>
        <option value="개인 일정">개인 일정</option>
      </select>
      <button type="button" id="add-btn" class="primary-btn">추가</button>
    </section>

    <nav class="filter-tabs" id="filter-tabs">
      <button type="button" class="filter-tab active" data-filter="전체">전체</button>
      <button type="button" class="filter-tab" data-filter="학교 공부">학교 공부</button>
      <button type="button" class="filter-tab" data-filter="개인 공부">개인 공부</button>
      <button type="button" class="filter-tab" data-filter="업무">업무</button>
      <button type="button" class="filter-tab" data-filter="개인 일정">개인 일정</button>
    </nav>

    <ul id="todo-list" class="todo-list"></ul>
    <p id="empty-state" class="empty-state" hidden></p>

    <footer class="app-footer">
      <span id="progress-text">진행: 0/0 완료 (0%)</span>
    </footer>

    <section class="calendar">
      <div class="cal-header">
        <button type="button" class="cal-nav" id="cal-prev" aria-label="이전 달">‹</button>
        <span class="cal-title" id="cal-title"></span>
        <button type="button" class="cal-nav" id="cal-next" aria-label="다음 달">›</button>
      </div>
      <div class="cal-weekdays">
        <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
      <button type="button" class="cal-clear" id="cal-clear" hidden>전체 날짜 보기</button>
    </section>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
